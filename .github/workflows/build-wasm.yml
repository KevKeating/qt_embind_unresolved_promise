name: Build Qt WASM App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config perl python3 \
            libgl1-mesa-dev libglu1-mesa-dev libfontconfig1-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxcb1-dev libxcb-cursor-dev \
            libxcb-glx0-dev libxcb-keysyms1-dev libxcb-image0-dev \
            libxcb-shm0-dev libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-util-dev libxcb-xinerama0-dev \
            libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.7'
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten
        run: emcc -v

      - name: Cache Qt host build
        id: cache-qt-host
        uses: actions/cache@v4
        with:
          path: /opt/qt-host
          key: qt-host-6.10.2-${{ runner.os }}

      - name: Cache Qt WASM build
        id: cache-qt-wasm
        uses: actions/cache@v4
        with:
          path: /opt/qt-wasm
          key: qt-wasm-6.10.2-em4.0.7-${{ runner.os }}

      - name: Download Qt 6.10.2 source
        if: steps.cache-qt-host.outputs.cache-hit != 'true' || steps.cache-qt-wasm.outputs.cache-hit != 'true'
        run: |
          wget -q https://download.qt.io/official_releases/qt/6.10/6.10.2/single/qt-everywhere-src-6.10.2.tar.xz
          tar xf qt-everywhere-src-6.10.2.tar.xz
          rm qt-everywhere-src-6.10.2.tar.xz

      - name: Build Qt host
        if: steps.cache-qt-host.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-qt-host && cd build-qt-host
          ../qt-everywhere-src-6.10.2/configure \
            -prefix /opt/qt-host \
            -release \
            -nomake examples \
            -nomake tests \
            -submodules qtbase \
            -- -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build . --parallel $(nproc)
          cmake --install .

      - name: Build Qt WASM
        if: steps.cache-qt-wasm.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-qt-wasm && cd build-qt-wasm
          ../qt-everywhere-src-6.10.2/configure \
            -prefix /opt/qt-wasm \
            -qt-host-path /opt/qt-host \
            -platform wasm-emscripten \
            -release \
            -nomake examples \
            -nomake tests \
            -submodules qtbase \
            -- -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build . --parallel $(nproc)
          cmake --install .

      - name: Configure application
        run: |
          mkdir -p build-app
          /opt/qt-wasm/bin/qt-cmake -S ${{ github.workspace }} -B build-app -DCMAKE_BUILD_TYPE=Release

      - name: Build application
        run: cmake --build build-app --parallel $(nproc)

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-app
          path: |
            build-app/*.wasm
            build-app/*.js
            build-app/*.html
            build-app/*.svg
